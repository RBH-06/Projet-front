<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Test TP 2</title>

        <link href="style.css" rel="stylesheet">

        <style>header { text-align : center; padding : 1rem; }</style>
    </head>
    <body>
        <header>
            <h1>Test TP 2 - DAWEB</h1>
        </header>

        <hr>

        <form>
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom"/>
            <br>

            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" name="prenom"/>
            <br>

            <label for="date">Date de naissance</label>
            <input type="date" id="date" name="date"/>
            <br>

            <label for="lieu">Lieu de naissance</label>
            <select name="lieu" id="lieu">
                <option value="bejaia">Béjaïa</option>
                <option value="tizi">Tizi-Ouzou</option>
            </select>
            <br>

            <label for="univ">Université</label>
            <select name="univ" id="univ">
                <option value="bejaia">Université de Béjaïa (UAMB)</option>
                <option value="tizi">Université de Tizi-Ouzou (UMMTO)</option>
            </select>
            <br>

            <label for="fillieres">Fillière</label>
            <select name="fillieres" id="fillieres">
            </select>
            <br>

            <button type="submit">Génerer ma carte</button>
            <button type="reset">Réinitialiser</button>
        </form>

        <article id="carte" class="carte">
            <img id="carte-logo">
            <h2 id="carte-titre"></h2>
            <ul>
                <li><strong>Nom :</strong> <span id="carte-nom"></span></li>
                <li><strong>Prénom :</strong> <span id="carte-prenom"></span></li>
                <li><strong>Date de naissance :</strong> <span id="carte-date"></span></li>
                <li><strong>Lieu de naissance :</strong> <span id="carte-lieu"></span></li>
                <li><strong>Filière :</strong> <span id="carte-filliere"></span></li>
                <li><strong>Faculté :</strong> <span id="carte-faculte"></span></li>
                <li><strong>Grade :</strong> <span id="carte-grade"></span></li>
                <li><strong>Année universitaire :</strong> <span id="carte-annee"></span></li>
            </ul>
        </article>

        <script src="script.js"></script>
    </body>
</html>
